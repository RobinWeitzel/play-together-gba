<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#8b7cf6"/>
      <stop offset="100%" stop-color="#2ea866"/>
    </linearGradient>
  </defs>
  <!-- Maskable background fills the whole canvas. The glyph sits inside
       the inner ~80% safe area required by Android adaptive-icon masks. -->
  <rect width="512" height="512" fill="url(#g)"/>
  <!-- Gamepad glyph: same 32-unit design as favicon.svg, scaled 16×. -->
  <g transform="scale(16) translate(4 4)"
     fill="none" stroke="#ffffff"
     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="2" y="7" width="20" height="11" rx="3"/>
    <!-- D-pad cross -->
    <line x1="7"   y1="10.5" x2="7"   y2="14.5"/>
    <line x1="5"   y1="12.5" x2="9"   y2="12.5"/>
    <!-- Face buttons -->
    <circle cx="16"   cy="11.5" r="1.2" fill="#ffffff" stroke="none"/>
    <circle cx="18.5" cy="13.5" r="1.2" fill="#ffffff" stroke="none"/>
  </g>
</svg>
