<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#8b7cf6"/>
      <stop offset="100%" stop-color="#2ea866"/>
    </linearGradient>
  </defs>
  <!-- Maskable background fills the whole canvas; safe area for the
       glyph is the inner 80% (51px padding on a 512 canvas). -->
  <rect width="512" height="512" fill="url(#g)"/>
  <!-- Gamepad glyph, centered inside the safe area. -->
  <g fill="none" stroke="#ffffff" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" transform="translate(94 168) scale(13)">
    <rect x="2" y="7" width="20" height="11" rx="3"/>
    <line x1="7"   y1="11"   x2="7"   y2="14"/>
    <line x1="5.5" y1="12.5" x2="8.5" y2="12.5"/>
    <circle cx="16" cy="11.5" r="0.9" fill="#ffffff" stroke="none"/>
    <circle cx="18" cy="13.5" r="0.9" fill="#ffffff" stroke="none"/>
  </g>
</svg>
